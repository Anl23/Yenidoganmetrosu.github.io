<!-- Fotoğraf büyütme ekranı -->

<div id="lightbox" class="lightbox">


<span class="close" onclick="closeLightbox()">
×
</span>


<span class="prev" onclick="changePhoto(-1)">
❮
</span>



<img id="lightbox-img">



<span class="next" onclick="changePhoto(1)">
❯
</span>

<style>


.lightbox{

display:none;

position:fixed;

z-index:999;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,0.9);

align-items:center;

justify-content:center;

}



.lightbox img{

max-width:80%;

max-height:80%;

border-radius:15px;

}



.close{

position:absolute;

top:30px;

right:50px;

font-size:45px;

cursor:pointer;

color:white;

}



.prev,.next{

position:absolute;

top:50%;

font-size:50px;

cursor:pointer;

color:white;

padding:20px;

}



.prev{

left:30px;

}



.next{

right:30px;

}


</style>





<script>


// İstasyon aç kapa


function openStations(){


let menu=document.getElementById("stations");



if(menu.style.display==="block"){

menu.style.display="none";

}

else{

menu.style.display="block";

}


}





// Fotoğraf alanlarını açma


function showPhotos(id){


let photos=document.querySelectorAll(".photos");



photos.forEach(function(photo){

photo.style.display="none";

});



document.getElementById(id).style.display="block";


}







// Galeri sistemi


let currentImages=[];

let currentIndex=0;




let allImages=document.querySelectorAll(".photos img");



allImages.forEach(function(img){


img.onclick=function(){


currentImages=[];


let parent=img.parentElement;


let images=parent.querySelectorAll("img");



images.forEach(function(image){

currentImages.push(image.src);

});



currentIndex=currentImages.indexOf(img.src);



openLightbox();


}



});






function openLightbox(){


document.getElementById("lightbox").style.display="flex";


document.getElementById("lightbox-img").src=currentImages[currentIndex];


}






function closeLightbox(){


document.getElementById("lightbox").style.display="none";


}







function changePhoto(direction){


currentIndex+=direction;



if(currentIndex<0){

currentIndex=currentImages.length-1;

}



if(currentIndex>=currentImages.length){

currentIndex=0;

}



document.getElementById("lightbox-img").src=currentImages[currentIndex];



}




// ESC ile kapatma


document.addEventListener("keydown",function(e){


if(e.key==="Escape"){

closeLightbox();

}



});



</script>
